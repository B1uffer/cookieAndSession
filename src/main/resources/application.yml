server:
  servlet:
    session:
      timeout: 30m # 30분동안 활동이 없으면, 세션 종료

spring:
  application:
    name: cookieAndSession
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:mem:cookieAndSession
    driver-class-name: org.h2.Driver
    username: sa
    password:
